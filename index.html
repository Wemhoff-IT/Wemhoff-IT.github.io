<!DOCTYPE html>
<html lang="de-DE">
	<head>
		<meta charset="utf-8">
		<title>JavaScript</title>	
		
	</head>
	<body>
	
		<h1>Benzinpreisrechner</h1>

		<script>
		
		let liter = parseFloat(window.prompt("Wie viel Liter Treibstoff möchten Sie tanken?").trim());
		let fuel = window.prompt("Welche Art Treibstoff möchten Sie tanken?").trim();
		
		if(fuel == "Diesel" || fuel == "Super" || fuel == "E10" )
		{
			if(typeof(liter) === "number")
			{
				let calc;			

				if(fuel == "Diesel") calc = liter * 1.74
				if(fuel == "Super") calc = liter * 1.82
				if(fuel == "E10") calc = liter * 1.78
				
				document.write("<h2>Vielen Dank</h2><br>");			
				document.write("<p>Sie Tanken: " + liter + " Liter " + fuel + "</p><br>");
				document.write("<p>Die Gesamtsumme beträgt: " + calc + "</p>");			
			}
			else
			{
				document.write("<p>Bitte nur Zahlen bei der Literangabe überprüfen</p>");
			}
		}
		else
		{	
			document.write("<p>Bitte die Treibstoffangabe überprüfen. Mögliche Treibstoffarten sind Diesel, Super oder E10</p>");			
		}
		</script>
	</body>
</html>
