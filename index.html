<!DOCTYPE html>
<html lang="de-DE">
	<head>
		<meta charset="utf-8">
		<title>JavaScript</title>	
		<link rel="stylesheet" href="./index.css">			
		<script src="index.js"></script>
		<!--aufgabe für 16.10- Bildergalerie mit klick in großer ansicht darstellen ordner tag09-->
	</head>
	<body>
		<div class="container">
			<div class="guessgame" id="divGuessGame">
				<h1 style="font-size: xx-large;" class="center">Zahlenraten</h1>		
				<input style="height: 13px;" type="text" name="number" onkeypress="enterCheckTheMath(event)" id="guessInput" autocomplete="off" />
				<button style="height: 10px;" class="button-5" onclick="checkTheMath()" id="btnGuess">Raten</button>
			</div>
			<div class="date" id="divCountdown">								
				<div style="text-align: center;" id="anzeige"></div>
				<script>
					window.setInterval(countdown,1000);
				</script>
			</div>
			<div class="tshirtForm">				
				<form>
					<fieldset>
						<label>Farbe</label>						
						<select name="farbe">
							<option>Grün</option>
							<option>Blau</option>
							<option>Rot</option>
						</select><br>
						<label>Schriftart</label>										
						<select name="schriftart">
							<option>Arial</option>
							<option>Times New Roman</option>							
						</select><br>
						<label>Ausrichtung</label>										
						<select name="ausrichtung">
							<option>Links</option>
							<option>Rechts</option>							
						</select><br>
						<label>Größe</label>					
						<select name="groesse">
							<option>S</option>
							<option>L</option>
							<option>XL</option>
							<option>XXL</option>
						</select><br>
					<br>
					<button onclick="auslesen();">Auslesen</button>
				</fieldset>					
				</form>
			</div>
			<div class="tshirt">				
				<img src="tshirt.jpg" alt=""></img>
			</div>
		</div>
	</body>
</html>
