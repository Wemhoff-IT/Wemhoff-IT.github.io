		<meta charset="utf-8">

		<link rel="stylesheet" href="./index.css">			
		<script src="index.js"></script>
		<style>
		#klein img{
			height: 100px;
		}
		#verfolger {

		}

	<body>		
		<h3>Uhrzeit</h3>
		<div id="uhranzeige"></div>
		<script>
		 // Aufruf der funktion
		 uhr();
		 setInterval(uhr, 1000);
		</script>

			for(let i=0;i<document.querySelectorAll('#klein img').length;i++)
				document.querySelectorAll('#klein img')[i].onmouseover = function() {tauschen(this);};			
		</script>

		<h3>Formular auslesen</h3>
		<form name="f" onsubmit="return false;">

		<button id="b1" onclick="farbwechsel()">Hintergrundfarbe wechseln</button>

		<form name="f2" onsubmit="return false;">
			<input type="text" name="tx">
			<button onclick="erzeugen()">Absatz erzeugen</button>
			<div id="elementausgabe"></div>
		</form>

		<h3 id="verfolger">Mausverfolger</h3>
		<script>
			//document.onmousemove = function() { mausfolgen(event);};
		</script>

		<h3>Animation</h3>
		<button onclick="starten()">Start</button>
		<button onclick="stoppen()">Stop</button>
		<div id="kreis"></div>

	</body>
</html>
