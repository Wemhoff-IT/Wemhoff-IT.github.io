<!DOCTYPE html>
<html lang="de-DE">
	<head>
		<meta charset="utf-8">
		<title>JavaScript</title>	
		<link rel="stylesheet" href="./index.css">		
	</head>
	<body>
	
		<h1 class="center">Zahlenraten</h1>

		<script>

		let rnd = Math.floor(Math.random() * (10 - 1 + 1) + 1);
		let guess = parseFloat(window.prompt("Bitte eine Zahl zwichen 1 und 10 Raten!").trim());
		let i = 0;
		
		while(guess != rnd)
		{
			i++;			
			if(guess > rnd)
				guess = parseFloat(window.prompt("Leider zu Hoch! Bitte die Zahl noch einmal Raten!").trim());
			else
				guess = parseFloat(window.prompt("Leider zu Niedrig! Bitte die Zahl noch einmal Raten!").trim());
		}

		document.write("<p class='center'>Richtig geraten!" + " Die Zahl war: " + guess + "</p> <br>");
		document.write("<p class='center'>Sie haben " + i + " versuche gebraucht!</p> <br>");			

		</script>
	</body>
</html>
